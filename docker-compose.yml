version: '3.8'

services:

  # ─────────────────────────────
  # Service 1: Django Web App
  # ─────────────────────────────
  web:
    # Build image dari Dockerfile di folder ini (titik = current directory)
    build: .
    container_name: simple_lms_web
    # Jalankan server Django, tunggu db siap dulu dengan wait-for script
    command: python manage.py runserver 0.0.0.0:8000
    ports:
      - "8000:8000"
    # Bind mount: folder project di laptop di-sync ke /app di container
    # Perubahan kode langsung terlihat tanpa rebuild image
    volumes:
      - .:/app
    # Baca environment variables dari file .env
    env_file:
      - .env
    # Jalankan hanya setelah service db siap
    depends_on:
      db:
        condition: service_healthy
    networks:
      - lms_network
    restart: unless-stopped

  # ─────────────────────────────
  # Service 2: PostgreSQL Database
  # ─────────────────────────────
  db:
    image: postgres:15-alpine
    container_name: simple_lms_db
    environment:
      # Variabel ini dibaca langsung oleh image PostgreSQL resmi
      POSTGRES_DB: lms_db
      POSTGRES_USER: lms_user
      POSTGRES_PASSWORD: lms_password_2024
    volumes:
      # Named volume untuk menyimpan data PostgreSQL secara persisten
      - postgres_data:/var/lib/postgresql/data
    ports:
      # Expose ke host agar bisa diakses tools database (DBeaver, pgAdmin, dll)
      - "5433:5432"
    # Health check: Docker Compose akan tunggu sampai PostgreSQL benar-benar siap
    # sebelum menjalankan service web
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lms_user -d lms_db"]
      interval: 5s     # Cek setiap 5 detik
      timeout: 5s      # Timeout tiap pengecekan
      retries: 5       # Coba 5 kali sebelum dianggap gagal
    networks:
      - lms_network
    restart: unless-stopped

# ─────────────────────────────
# Named Volumes
# ─────────────────────────────
volumes:
  postgres_data:
    driver: local

# ─────────────────────────────
# Custom Network
# ─────────────────────────────
networks:
  lms_network:
    driver: bridge