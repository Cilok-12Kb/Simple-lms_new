version: '3.8'

services:

  web:
    build: .
    container_name: simple_lms_web
    command: python manage.py runserver 0.0.0.0:8000
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - lms_network
    restart: unless-stopped

  db:
    image: postgres:15-alpine
    container_name: simple_lms_db
    environment:
      POSTGRES_DB: lms_db
      POSTGRES_USER: lms_user
      POSTGRES_PASSWORD: lms_password_2024
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lms_user -d lms_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - lms_network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: simple_lms_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - lms_network
    restart: unless-stopped

  mongodb:
    image: mongo:7
    container_name: simple_lms_mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: mongo_password_2024
    volumes:
      - mongo_data:/data/db
    networks:
      - lms_network
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: simple_lms_rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: rabbit_password_2024
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - lms_network
    restart: unless-stopped

  celery_worker:
    build: .
    container_name: simple_lms_celery_worker
    command: celery -A config.celery_app worker -l info -Q default,emails,reports,celery
    volumes:
      - .:/app
    env_file:
      - .env
    depends_on:
      - web
      - rabbitmq
      - redis
    networks:
      - lms_network
    restart: unless-stopped

  celery_beat:
    build: .
    container_name: simple_lms_celery_beat
    command: celery -A config.celery_app beat -l info
    volumes:
      - .:/app
    env_file:
      - .env
    depends_on:
      - celery_worker
    networks:
      - lms_network
    restart: unless-stopped

  flower:
    build: .
    container_name: simple_lms_flower
    command: celery -A config.celery_app flower --port=5555
    ports:
      - "5555:5555"
    env_file:
      - .env
    depends_on:
      - celery_worker
      - rabbitmq
    networks:
      - lms_network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  mongo_data:
  rabbitmq_data:

networks:
  lms_network:
    driver: bridge